<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erick Fernando | Consultoria Fitness</title>
    <style>
        :root {
            --azul-claro: #add8e6;
            --prata: #c0c0c0;
            --branco: #ffffff;
            --azul-escuro: #4682b4;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            /* FUNDO COM FOTO E PELÍCULA CLARA */
            background-image: linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.75)), 
                              url('perfil (2).jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        header {
            background: transparent; 
            padding: 40px 20px;
            text-align: center;
        }

        .perfil-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 1000px;
            margin: auto;
            position: relative;
        }

        /* TEXTO SOBRE NO CANTO SUPERIOR ESQUERDO */
        .sobre-erick {
            text-align: left;
            max-width: 300px;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9em;
            border-left: 4px solid var(--azul-escuro);
            margin-bottom: 20px;
            align-self: flex-start;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .foto-perfil {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid var(--branco);
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { 
            margin-top: 15px; 
            color: var(--azul-escuro); 
            font-size: 2.5em;
            text-shadow: 1px 1px 2px white;
            letter-spacing: 1px;
        }

        .container { max-width: 1000px; margin: auto; padding: 20px; }

        .servico-card, .plano-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 1px solid var(--prata);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        /* EFEITO DE SALTAR AO PASSAR O MOUSE */
        .servico-card:hover, .plano-card:hover {
            transform: scale(1.05) translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border-color: var(--azul-escuro);
        }

        .servicos, .planos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .preco { font-size: 2em; font-weight: bold; margin: 20px 0; color: #444; }

        .btn-pagamento {
            display: block;
            background-color: var(--azul-escuro);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-pagamento:hover { background-color: #36648b; }

        /* WHATSAPP FLUTUANTE COM BRILHO BRANCO */
        @keyframes glow {
            0% { box-shadow: 0 0 5px #fff; transform: scale(1); }
            50% { box-shadow: 0 0 20px #fff, 0 0 30px #25d366; transform: scale(1.1); }
            100% { box-shadow: 0 0 5px #fff; transform: scale(1); }
        }

        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 40px;
            right: 40px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 3px #999;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            animation: glow 2s infinite ease-in-out;
        }

        footer { background: rgba(192, 192, 192, 0.9); padding: 40px; text-align: center; margin-top: 50px; }

        @media (max-width: 600px) {
            .sobre-erick { align-self: center; text-align: center; }
        }
    </style>
</head>

        <div class="perfil-container">
            <div class
